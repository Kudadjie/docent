name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publisher OIDC
      contents: write  # required for creating GitHub releases

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Frontend lint
        run: npm run lint
        working-directory: frontend

      - name: Build UI
        run: python scripts/build_ui.py

      - name: Audit dependencies
        # CVE-2026-42203/42208/42271 affect litellm's proxy/server — Docent uses
        # litellm for outbound API calls only. Suppressed until a stable fix lands.
        run: uv run pip-audit --ignore-vuln CVE-2026-42203 --ignore-vuln CVE-2026-42208 --ignore-vuln CVE-2026-42271

      - name: Lint
        run: uv run ruff check src/

      - name: Test
        env:
          LITELLM_LOCAL_MODEL_COST_MAP: "True"
          PYTHONUNBUFFERED: "1"
          DOCENT_NO_INTERACTIVE: "1"
        run: |
          uv run python -u -m pytest \
            -m "not integration and not eval" \
            --timeout=30 \
            --tb=short \
            -q \
            -o addopts=""

      - name: Build package
        run: uv build --wheel

      - name: Publish to PyPI
        run: uv publish

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            dist/*.whl \
            --title "${{ github.ref_name }}" \
            --generate-notes
