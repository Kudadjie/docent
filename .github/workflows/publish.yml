name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for Trusted Publisher OIDC

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Set up Node.js
        uses: actions/setup-node@v4  # TODO: pin to SHA before next audit
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build UI
        run: python scripts/build_ui.py

      - name: Audit dependencies
        # CVE-2026-42203/42208/42271 affect litellm's proxy/server — Docent uses
        # litellm for outbound API calls only. Suppressed until a stable fix lands.
        run: uv run pip-audit --ignore-vuln CVE-2026-42203 --ignore-vuln CVE-2026-42208 --ignore-vuln CVE-2026-42271

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
