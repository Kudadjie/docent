name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        # --all-extras installs the optional `backup` extra (heavy google-api packages)
        # which is not needed for unit tests. Use plain sync for faster CI.
        run: uv sync

      - name: Lint
        run: uv run ruff check src/

      - name: Unit tests
        # Skip integration (need real network) and eval (need real LLM) tests in CI.
        run: uv run pytest -m "not integration and not eval" --tb=short -q
