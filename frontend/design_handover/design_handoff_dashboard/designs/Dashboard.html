<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Docent</title>
<link rel="icon" href="../assets/favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="studio-shared.jsx"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; width: 100%; }
body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; overflow: hidden; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.22); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(128,128,128,0.4); }

@keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

.qa-row { transition: background 0.12s ease; }
.qa-row:hover { background: var(--qa-hover) !important; }
.dash-card { /* entry animation handled via CSS, no opacity to ensure capture */ }
.cta-link { transition: opacity 0.12s ease; }
.cta-link:hover { opacity: 0.78; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {
  SANS, MONO, BRAND, BRAND_DEEP, BLUE, AMBER, RED, VIOLET,
  makeTheme, ThemeCtx, useTheme,
  Ico, Sidebar, StatusBanner,
} = window;

// ─── DASHBOARD-SPECIFIC TOKENS ────────────────────────────────────────────────
// The dashboard uses a tighter card surface than the rest of the system: bg one
// step darker, radius 8px (vs 16). Captured here so they read like intentional
// dashboard tokens rather than magic numbers.
function dashTokens(dark) {
  return {
    pageBg:     dark ? '#0d0d0d' : '#f8f9fa',
    cardBg:     dark ? '#111111' : '#ffffff',
    cardBorder: dark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.06)',
    divider:    dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.05)',
    radius:     8,
    sectionLabel: dark ? '#606060' : '#888888',
    dataMuted:    dark ? '#707070' : '#888888',
    dataBright:   dark ? '#ededed' : '#0d0d0d',
    rowHover:     dark ? 'rgba(255,255,255,0.025)' : 'rgba(0,0,0,0.025)',
  };
}

// ─── DATA ─────────────────────────────────────────────────────────────────────
const USER = { name: 'John', program: 'MSc Coastal Engineering' };
const TODAY = new Date('2026-05-20T14:30:00');

const READING = {
  queued: 12,
  reading: 2,
  done: 8,
  next: {
    title: 'Compound flooding from tropical cyclones: a Bayesian attribution framework',
    order: 1,
    tag: 'Storm surge',
    course: 'CES701',
  },
  deadlines: { pastDue: 1, dueSoon: 2 },
  inProgress: {
    title: 'High-resolution coupled coastal modeling',
    status: 'reading',
  },
  syncedAgo: '3h ago',
};

const STUDIO = {
  outputs: 18,
  today: 3,
  thisWeek: 6,
  recent: [
    { topic: 'Storm surge inundation', ago: '2h' },
    { topic: 'Wave runup models',      ago: '1d' },
    { topic: 'IPCC sea level',         ago: '3d' },
  ],
  byType: { research: 7, notes: 6, briefs: 5 },
  lastRunAgo: '2h ago',
};

// 8 weeks × 5 days (weekdays). 0=empty, 1=low, 2=med, 3=full.
// Reads left→right = oldest→most recent; top→bottom = Mon→Fri.
const HEATMAP = [
  // wk-8 wk-7 wk-6 wk-5 wk-4 wk-3 wk-2 wk-1   ← oldest → most recent
  [   0,   0,   0,   0,   1,   0,   2,   1 ], // Mon
  [   0,   1,   0,   0,   0,   2,   0,   1 ], // Tue
  [   0,   0,   1,   0,   1,   0,   3,   0 ], // Wed
  [   0,   0,   0,   1,   0,   2,   0,   1 ], // Thu
  [   0,   0,   0,   0,   1,   0,   1,   3 ], // Fri
];
// sum = 22 sessions

const QUICK_ACTIONS = [
  { id: 'queue',    label: 'Add to queue',     key: 'A', Icon: Ico.Plus     },
  { id: 'studio',   label: 'New studio run',   key: 'S', Icon: Ico.Sparkles },
  { id: 'feynman',  label: 'Feynman research', key: 'F', Icon: Ico.Cpu     },
  { id: 'backup',   label: 'Backup now',       key: 'B', Icon: Ico.Upload  },
];

// ─── FORMATTERS ───────────────────────────────────────────────────────────────
function formatDate(d) {
  const wd  = ['SUN','MON','TUE','WED','THU','FRI','SAT'][d.getDay()];
  const mo  = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'][d.getMonth()];
  const day = String(d.getDate()).padStart(2,'0');
  const yr  = d.getFullYear();
  const hr  = d.getHours();
  const mn  = String(d.getMinutes()).padStart(2,'0');
  const ap  = hr >= 12 ? 'PM' : 'AM';
  const h12 = ((hr + 11) % 12) + 1;
  return `${wd} ${day} ${mo} ${yr} · ${h12}:${mn} ${ap}`;
}
function greeting(d) {
  const h = d.getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}

// ─── PRIMITIVES ───────────────────────────────────────────────────────────────
function SectionLabel({ children, accent, right }) {
  const T = useTheme();
  const D = dashTokens(T.dark);
  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:8 }}>
      <span style={{ display:'inline-flex', alignItems:'center', gap:7,
          fontFamily:MONO, fontSize:9, fontWeight:500, color:D.sectionLabel,
          letterSpacing:'0.85px', textTransform:'uppercase' }}>
        {accent && <span style={{ width:5, height:5, borderRadius:'50%', background:accent, flexShrink:0 }} />}
        {children}
      </span>
      {right}
    </div>
  );
}

function CardShell({ children, style }) {
  const T = useTheme();
  const D = dashTokens(T.dark);
  return (
    <div className="dash-card"
      style={{ background:D.cardBg, border:`1px solid ${D.cardBorder}`,
        borderRadius:D.radius, overflow:'hidden', display:'flex', flexDirection:'column',
        flexShrink:0, ...style }}>
      {children}
    </div>
  );
}

function Divider() {
  const T = useTheme();
  const D = dashTokens(T.dark);
  return <div style={{ height:1, background:D.divider }} />;
}

// ─── GREETING STRIP ───────────────────────────────────────────────────────────
function GreetingStrip() {
  const T = useTheme();
  const D = dashTokens(T.dark);
  return (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'14px 24px', borderBottom:`1px solid ${D.divider}` }}>
      <div style={{ display:'flex', alignItems:'center', gap:8, minWidth:0 }}>
        <span style={{ fontFamily:SANS, fontSize:16, fontWeight:600, color:T.fg1,
          letterSpacing:'-0.2px' }}>
          {greeting(TODAY)}, {USER.name}
        </span>
        <span style={{ color:D.sectionLabel, fontSize:14, lineHeight:1 }}>·</span>
        <span style={{ fontFamily:SANS, fontSize:14, color:T.fg3 }}>
          {USER.program}
        </span>
      </div>
      <span style={{ fontFamily:MONO, fontSize:11, color:D.dataMuted,
          letterSpacing:'0.5px', whiteSpace:'nowrap' }}>
        {formatDate(TODAY)}
      </span>
    </div>
  );
}

// ─── GLOBAL STAT ROW ──────────────────────────────────────────────────────────
function StatCell({ value, label, color, dim }) {
  const T = useTheme();
  const D = dashTokens(T.dark);
  return (
    <div style={{ flex:1, padding:'18px 22px', display:'flex', flexDirection:'column', gap:6,
        minWidth:0 }}>
      <div style={{ fontFamily:MONO, fontSize:28, fontWeight:600,
          color: dim ? D.dataMuted : (color || D.dataBright),
          letterSpacing:'-0.5px', lineHeight:1 }}>
        {value}
      </div>
      <div style={{ fontFamily:MONO, fontSize:10, fontWeight:500, color:D.sectionLabel,
          letterSpacing:'1px', textTransform:'uppercase' }}>
        {label}
      </div>
    </div>
  );
}

function GlobalStatRow() {
  const T = useTheme();
  const D = dashTokens(T.dark);
  return (
    <CardShell style={{ flexDirection:'row' }}>
      <StatCell value="12" label="Queued" />
      <div style={{ width:1, background:D.divider }} />
      <StatCell value="2"  label="Reading" color={BRAND} />
      <div style={{ width:1, background:D.divider }} />
      <StatCell value="8"  label="Done" dim />
      <div style={{ width:1, background:D.divider }} />
      <StatCell value="18" label="Outputs" color={VIOLET} />
    </CardShell>
  );
}

// ─── READING CARD ─────────────────────────────────────────────────────────────
function Section({ label, accent, children, right }) {
  return (
    <div style={{ padding:'14px 18px', display:'flex', flexDirection:'column', gap:8 }}>
      <SectionLabel accent={accent} right={right}>{label}</SectionLabel>
      <div>{children}</div>
    </div>
  );
}

function ReadingCard() {
  const T = useTheme();
  const D = dashTokens(T.dark);
  const r = READING;
  const showDeadlines = r.deadlines.pastDue > 0 || r.deadlines.dueSoon > 0;
  return (
    <CardShell>
      {/* Header */}
      <div style={{ padding:'12px 18px', display:'flex', alignItems:'center',
          justifyContent:'space-between', borderBottom:`1px solid ${D.divider}` }}>
        <span style={{ fontFamily:MONO, fontSize:10, fontWeight:500, color:D.sectionLabel,
            letterSpacing:'1px', textTransform:'uppercase' }}>
          Reading — Queue
        </span>
        <span title="Active" style={{ display:'inline-flex', alignItems:'center', gap:6,
            fontFamily:MONO, fontSize:9, color:BRAND_DEEP, letterSpacing:'0.8px',
            textTransform:'uppercase' }}>
          <span style={{ width:6, height:6, borderRadius:'50%', background:BRAND,
            animation:'pulse-dot 2.2s ease-in-out infinite' }} />
          Active
        </span>
      </div>

      {/* Stats line */}
      <Section label="Stats" accent={BRAND}>
        <div style={{ fontFamily:MONO, fontSize:13, color:T.fg2, letterSpacing:'0.2px' }}>
          <span style={{ color:T.fg1, fontWeight:500 }}>{r.queued}</span> queued
          <span style={{ color:D.sectionLabel, margin:'0 8px' }}>·</span>
          <span style={{ color:BRAND, fontWeight:500 }}>{r.reading}</span> reading
          <span style={{ color:D.sectionLabel, margin:'0 8px' }}>·</span>
          <span style={{ color:T.fg1, fontWeight:500 }}>{r.done}</span> done
        </div>
      </Section>
      <Divider />

      {/* Next */}
      <Section label="Next up">
        <div style={{ fontFamily:SANS, fontSize:13, color:T.fg1, fontWeight:500, lineHeight:1.4,
            overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}
            title={r.next.title}>
          {r.next.title}
        </div>
        <div style={{ marginTop:5, fontFamily:MONO, fontSize:11, color:D.dataMuted,
            letterSpacing:'0.4px' }}>
          <span style={{ color:T.fg3 }}>#{r.next.order}</span>
          <span style={{ margin:'0 7px' }}>·</span>
          <span style={{ color:T.fg3, textTransform:'none' }}>{r.next.tag}</span>
          <span style={{ margin:'0 7px' }}>·</span>
          <span style={{ textTransform:'uppercase' }}>{r.next.course}</span>
        </div>
      </Section>
      <Divider />

      {/* Deadlines — only if there are issues */}
      {showDeadlines && (
        <>
          <Section label="Deadlines">
            <div style={{ fontFamily:MONO, fontSize:11, letterSpacing:'0.3px', lineHeight:1.7 }}>
              {r.deadlines.pastDue > 0 && (
                <span style={{ color:RED }}>
                  <span style={{ fontWeight:600 }}>{r.deadlines.pastDue}</span> past due
                </span>
              )}
              {r.deadlines.pastDue > 0 && r.deadlines.dueSoon > 0 && (
                <span style={{ color:D.sectionLabel, margin:'0 8px' }}>·</span>
              )}
              {r.deadlines.dueSoon > 0 && (
                <span style={{ color:AMBER }}>
                  <span style={{ fontWeight:600 }}>{r.deadlines.dueSoon}</span> due soon
                </span>
              )}
            </div>
          </Section>
          <Divider />
        </>
      )}

      {/* In progress */}
      <Section label="In progress" right={
        <span style={{ display:'inline-flex', alignItems:'center', gap:5,
            padding:'2px 8px', borderRadius:9999,
            border:`1px solid ${BRAND}66`, color:BRAND_DEEP,
            fontFamily:MONO, fontSize:9, fontWeight:600,
            letterSpacing:'0.6px', textTransform:'uppercase', background:'transparent' }}>
          <span style={{ width:4, height:4, borderRadius:'50%', background:BRAND }} />
          Reading
        </span>
      }>
        <div style={{ fontFamily:SANS, fontSize:13, color:T.fg1, fontWeight:500,
            lineHeight:1.4, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}
            title={r.inProgress.title}>
          {r.inProgress.title}
        </div>
      </Section>

      {/* Footer */}
      <div style={{ flex:1 }} />
      <div style={{ padding:'10px 18px', borderTop:`1px solid ${D.divider}`,
          display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <span style={{ fontFamily:MONO, fontSize:10, color:D.dataMuted,
            letterSpacing:'0.5px', textTransform:'uppercase' }}>
          Synced {r.syncedAgo}
        </span>
        <a href="#" className="cta-link"
          style={{ fontFamily:SANS, fontSize:12, fontWeight:500, color:BRAND,
            textDecoration:'none', display:'inline-flex', alignItems:'center', gap:4 }}>
          Open <span style={{ fontFamily:MONO }}>→</span>
        </a>
      </div>
    </CardShell>
  );
}

// ─── STUDIO CARD ──────────────────────────────────────────────────────────────
function StudioCard() {
  const T = useTheme();
  const D = dashTokens(T.dark);
  const s = STUDIO;
  return (
    <CardShell>
      <div style={{ padding:'12px 18px', display:'flex', alignItems:'center',
          justifyContent:'space-between', borderBottom:`1px solid ${D.divider}` }}>
        <span style={{ fontFamily:MONO, fontSize:10, fontWeight:500, color:D.sectionLabel,
            letterSpacing:'1px', textTransform:'uppercase' }}>
          Studio — Outputs
        </span>
        <span style={{ fontFamily:MONO, fontSize:9, color:VIOLET, letterSpacing:'0.8px',
            textTransform:'uppercase' }}>
          · {s.lastRunAgo}
        </span>
      </div>

      <Section label="Stats" accent={VIOLET}>
        <div style={{ fontFamily:MONO, fontSize:13, color:T.fg2, letterSpacing:'0.2px' }}>
          <span style={{ color:VIOLET, fontWeight:500 }}>{s.outputs}</span> outputs
          <span style={{ color:D.sectionLabel, margin:'0 8px' }}>·</span>
          <span style={{ color:T.fg1, fontWeight:500 }}>{s.today}</span> today
          <span style={{ color:D.sectionLabel, margin:'0 8px' }}>·</span>
          <span style={{ color:T.fg1, fontWeight:500 }}>{s.thisWeek}</span> this week
        </div>
      </Section>
      <Divider />

      <Section label="Recent">
        <div style={{ display:'flex', flexDirection:'column' }}>
          {s.recent.map((row, i) => (
            <div key={i} style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
                padding:'5px 0', gap:12 }}>
              <span style={{ fontFamily:SANS, fontSize:13, color:T.fg1, fontWeight:400,
                overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', minWidth:0 }}
                title={row.topic}>
                {row.topic}
              </span>
              <span style={{ fontFamily:MONO, fontSize:10, color:D.dataMuted,
                letterSpacing:'0.5px', textTransform:'uppercase', flexShrink:0 }}>
                {row.ago} ago
              </span>
            </div>
          ))}
        </div>
      </Section>
      <Divider />

      <Section label="By type">
        <div style={{ fontFamily:MONO, fontSize:11, color:D.dataMuted, letterSpacing:'0.3px' }}>
          <span><span style={{ color:T.fg2, fontWeight:500 }}>{s.byType.research}</span> research</span>
          <span style={{ margin:'0 9px' }}>·</span>
          <span><span style={{ color:T.fg2, fontWeight:500 }}>{s.byType.notes}</span> notes</span>
          <span style={{ margin:'0 9px' }}>·</span>
          <span><span style={{ color:T.fg2, fontWeight:500 }}>{s.byType.briefs}</span> briefs</span>
        </div>
      </Section>

      <div style={{ flex:1 }} />
      <div style={{ padding:'10px 18px', borderTop:`1px solid ${D.divider}`,
          display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <span style={{ fontFamily:MONO, fontSize:10, color:D.dataMuted,
            letterSpacing:'0.5px', textTransform:'uppercase' }}>
          Last run {s.lastRunAgo}
        </span>
        <a href="#" className="cta-link"
          style={{ fontFamily:SANS, fontSize:12, fontWeight:500, color:VIOLET,
            textDecoration:'none', display:'inline-flex', alignItems:'center', gap:4 }}>
          Open <span style={{ fontFamily:MONO }}>→</span>
        </a>
      </div>
    </CardShell>
  );
}

// ─── ACTIVITY HEATMAP ─────────────────────────────────────────────────────────
function Heatmap() {
  const T = useTheme();
  const D = dashTokens(T.dark);

  // Brand green at four intensities. Level 0 is the empty cell tint.
  const cellColor = (lvl) => {
    if (T.dark) {
      return ['rgba(255,255,255,0.04)',
              'rgba(24,226,153,0.22)',
              'rgba(24,226,153,0.48)',
              BRAND][lvl];
    }
    return ['rgba(0,0,0,0.05)',
            'rgba(24,226,153,0.30)',
            'rgba(24,226,153,0.60)',
            BRAND_DEEP][lvl];
  };

  const total = HEATMAP.reduce((a, row) => a + row.reduce((b, c) => b + c, 0), 0);

  return (
    <CardShell>
      <div style={{ padding:'12px 18px', display:'flex', alignItems:'center',
          justifyContent:'space-between', borderBottom:`1px solid ${D.divider}` }}>
        <span style={{ fontFamily:MONO, fontSize:9, fontWeight:500, color:D.sectionLabel,
            letterSpacing:'0.85px', textTransform:'uppercase' }}>
          Activity — Last 8 weeks
        </span>
        <span style={{ fontFamily:MONO, fontSize:10, color:T.fg2, letterSpacing:'0.4px' }}>
          <span style={{ color:T.fg1, fontWeight:500 }}>{total}</span>
          <span style={{ color:D.dataMuted }}> sessions total</span>
        </span>
      </div>

      <div style={{ padding:'18px 20px', display:'flex', flexDirection:'column', gap:14 }}>
        {/* Grid */}
        <div style={{ display:'grid', gridTemplateRows:'repeat(5, 1fr)', gap:5,
            justifyContent:'start' }}>
          {HEATMAP.map((row, ri) => (
            <div key={ri} style={{ display:'grid',
                gridTemplateColumns:'repeat(8, 18px)', gap:5 }}>
              {row.map((lvl, ci) => (
                <div key={ci}
                  title={`Week ${8 - ci} · ${['Mon','Tue','Wed','Thu','Fri'][ri]} · ${lvl} session${lvl===1?'':'s'}`}
                  style={{ width:18, height:18, borderRadius:3,
                    background: cellColor(lvl),
                    border: lvl === 0
                      ? `1px solid ${T.dark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.06)'}`
                      : 'none' }} />
              ))}
            </div>
          ))}
        </div>

        {/* Legend */}
        <div style={{ display:'flex', alignItems:'center', gap:8,
            fontFamily:MONO, fontSize:9, color:D.sectionLabel,
            letterSpacing:'0.7px', textTransform:'uppercase' }}>
          <span>Less</span>
          <span style={{ display:'inline-flex', gap:3 }}>
            {[0,1,2,3].map(l => (
              <span key={l} style={{ width:10, height:10, borderRadius:2,
                background:cellColor(l) }} />
            ))}
          </span>
          <span>More</span>
        </div>
      </div>
    </CardShell>
  );
}

// ─── QUICK ACTIONS ────────────────────────────────────────────────────────────
function QuickActions() {
  const T = useTheme();
  const D = dashTokens(T.dark);
  const hoverVar = { '--qa-hover': D.rowHover };
  return (
    <CardShell style={hoverVar}>
      <div style={{ padding:'12px 18px', borderBottom:`1px solid ${D.divider}` }}>
        <span style={{ fontFamily:MONO, fontSize:9, fontWeight:500, color:D.sectionLabel,
            letterSpacing:'0.85px', textTransform:'uppercase' }}>
          Quick actions
        </span>
      </div>
      <div style={{ display:'flex', flexDirection:'column' }}>
        {QUICK_ACTIONS.map((a, i) => {
          const Icon = a.Icon;
          return (
            <button key={a.id} className="qa-row"
              style={{ display:'flex', alignItems:'center', gap:11,
                padding:'10px 18px', border:'none', background:'transparent',
                borderTop: i === 0 ? 'none' : `1px solid ${D.divider}`,
                cursor:'pointer', textAlign:'left', color:'inherit', width:'100%' }}>
              <span style={{ width:22, height:22, display:'inline-flex', alignItems:'center',
                  justifyContent:'center', color:T.fg3, flexShrink:0 }}>
                <Icon />
              </span>
              <span style={{ flex:1, fontFamily:SANS, fontSize:13, color:T.fg1,
                  fontWeight:400 }}>
                {a.label}
              </span>
              <span style={{ display:'inline-flex', alignItems:'center', justifyContent:'center',
                  minWidth:22, height:20, padding:'0 6px', borderRadius:4,
                  background:T.gray100, border:`1px solid ${T.borderMd}`,
                  fontFamily:MONO, fontSize:10, fontWeight:500, color:T.fg3 }}>
                {a.key}
              </span>
            </button>
          );
        })}
      </div>
    </CardShell>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = window.useTweaks(/*EDITMODE-BEGIN*/{
    "darkMode": true,
    "showDeadlines": true,
    "compactDensity": false
  }/*EDITMODE-END*/);

  const dark = !!tweaks.darkMode;
  const T = React.useMemo(() => makeTheme(dark), [dark]);
  const D = dashTokens(dark);

  return (
    <ThemeCtx.Provider value={T}>
      <div data-screen-label="Dashboard"
        style={{ display:'flex', height:'100vh', width:'100vw', overflow:'hidden',
          background:D.pageBg, color:T.fg1, transition:'background 0.2s, color 0.2s' }}>

        <Sidebar active="dashboard" />

        <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0, overflow:'hidden' }}>

          <StatusBanner dark={dark} setDark={(v)=>setTweak('darkMode', v)} />

          {/* Greeting strip */}
          <GreetingStrip />

          {/* Dashboard content — single scroll area */}
          <div style={{ flex:1, overflowY:'auto', padding:'18px 24px 28px',
              display:'flex', flexDirection:'column', gap:16,
              background:D.pageBg }}>

            <GlobalStatRow />

            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, flexShrink:0 }}>
              <ReadingCard />
              <StudioCard />
            </div>

            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, flexShrink:0 }}>
              <Heatmap />
              <QuickActions />
            </div>

            {/* Footer breadcrumb-ish line */}
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
                fontFamily:MONO, fontSize:9, color:D.sectionLabel,
                letterSpacing:'0.85px', textTransform:'uppercase',
                paddingTop:4 }}>
              <span>Docent · Dashboard · {USER.program}</span>
              <span>v0.4.1 · {dark ? 'dark' : 'light'}</span>
            </div>
          </div>
        </div>

        <window.TweaksPanel>
          <window.TweakToggle label="Dark Mode" value={tweaks.darkMode}
            onChange={v => setTweak('darkMode', v)} />
          <window.TweakToggle label="Show deadlines section" value={tweaks.showDeadlines}
            onChange={v => setTweak('showDeadlines', v)} />
          <window.TweakToggle label="Compact density" value={tweaks.compactDensity}
            onChange={v => setTweak('compactDensity', v)} />
        </window.TweaksPanel>
      </div>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
