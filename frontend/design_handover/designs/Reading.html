<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papers — Docent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; width: 100%; overflow: hidden; }
body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.2); border-radius: 4px; }

@keyframes fadeInUp { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
@keyframes logo-dot-blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes logo-dot-done  { 0%,100%{box-shadow:0 0 0 0 rgba(24,226,153,0)} 50%{box-shadow:0 0 0 5px rgba(24,226,153,0.3)} }
@keyframes pulse-high     { 0%,100%{box-shadow:0 0 0 0 rgba(212,86,86,0.4)} 50%{box-shadow:0 0 0 4px rgba(212,86,86,0)} }

.row-fade { animation: fadeInUp 0.18s ease forwards; }
.paper-row .row-actions { opacity: 0; transition: opacity 0.12s; }
.paper-row:hover .row-actions { opacity: 1; }
.paper-row { transition: background 0.1s; }
.btn-icon:hover { opacity: 0.8; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const SANS = "'Inter', system-ui, sans-serif";
const MONO = "'Geist Mono', ui-monospace, monospace";
const BRAND = '#18E299';
const BRAND_DEEP = '#0fa76e';

// ─── THEME FACTORY ────────────────────────────────────────────────────────────
function makeTheme(dark) {
  return {
    bg:        dark ? '#0d0d0d' : '#ffffff',
    surface:   dark ? '#111111' : '#fafafa',
    card:      dark ? '#141414' : '#ffffff',
    fg1:       dark ? '#ededed' : '#0d0d0d',
    fg2:       dark ? '#c0c0c0' : '#333333',
    fg3:       dark ? '#a0a0a0' : '#666666',
    fg4:       dark ? '#606060' : '#888888',
    gray100:   dark ? '#1e1e1e' : '#f5f5f5',
    gray200:   dark ? '#2a2a2a' : '#e5e5e5',
    border:    dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)',
    borderMd:  dark ? 'rgba(255,255,255,0.10)' : 'rgba(0,0,0,0.09)',
    logoBorder:dark ? 'rgba(255,255,255,0.22)' : '#0d0d0d',
    rowHover:  dark ? '#1a1a1a' : '#fafafa',
    dark,
  };
}

// ─── THEME CONTEXT ────────────────────────────────────────────────────────────
const ThemeCtx = React.createContext(makeTheme(false));
const useTheme = () => React.useContext(ThemeCtx);

// ─── DATA ─────────────────────────────────────────────────────────────────────
const NAV = [
  { id:'dashboard', label:'Dashboard', icon: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg> },
  { id:'papers',    label:'Reading',   icon: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg> },
];

const SAMPLE_PAPERS = [
  { id:1, title:'Attention Is All You Need', authors:'Vaswani, A. · Shazeer, N. · Parmar, N. · et al.', year:2017, venue:'NeurIPS', status:'Reading',  priority:'High',   tags:['transformers','NLP'],       addedDate:'Apr 18, 2026' },
  { id:2, title:'A Survey of Large Language Models', authors:'Zhao, W. X. · Zhou, K. · Li, J. · et al.', year:2023, venue:'arXiv',  status:'Queued',   priority:'Medium', tags:['LLM','survey'],             addedDate:'Apr 22, 2026' },
  { id:3, title:'Chain-of-Thought Prompting Elicits Reasoning in Large Language Models', authors:'Wei, J. · Wang, X. · Schuurmans, D. · et al.', year:2022, venue:'NeurIPS', status:'Done', priority:'Low', tags:['prompting','reasoning'], addedDate:'Apr 10, 2026' },
];

const STATUS_CFG = {
  Reading: { bg:'#FFF7ED', text:'#B45309', dot:'#F59E0B' },
  Queued:  { bg:'#EFF6FF', text:'#1D4ED8', dot:'#3B82F6' },
  Done:    { bg:'#d4fae8', text:'#0fa76e', dot:'#18E299'  },
};
const STATUS_CFG_DARK = {
  Reading: { bg:'rgba(245,158,11,0.12)', text:'#F5A623', dot:'#F59E0B' },
  Queued:  { bg:'rgba(59,130,246,0.12)', text:'#60A5FA', dot:'#3B82F6' },
  Done:    { bg:'rgba(24,226,153,0.12)', text:'#18E299', dot:'#18E299'  },
};
const PRIORITY_COLOR = { High:'#D45656', Medium:'#C37D0D', Low:'#18E299' };

// ─── ICONS ────────────────────────────────────────────────────────────────────
const Ico = {
  CheckCircle: () => <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
  Edit2:       () => <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>,
  Trash2:      () => <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>,
  Plus:        () => <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  FolderOpen:  () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>,
  RefreshCw:   () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
  Upload:      () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
  Search:      () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
  Filter:      () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>,
  ExternalLink:() => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
  BookOpen:    () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
  Sun:         () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>,
  Moon:        () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>,
};

// ─── WORDMARK LOGO (sidebar) ──────────────────────────────────────────────────
function DocentWordmark() {
  const T = useTheme();
  const src = T.dark ? '../assets/logo-light.svg' : '../assets/logo.svg';
  return <img src={src} alt="Docent" style={{ height:24, display:'block' }} />;
}

// ─── STATUS INDICATOR (top-right pill) ────────────────────────────────────────
function StatusIndicator({ dotState = 'idle' }) {
  const T = useTheme();
  const dotColor = { idle:'#18E299', working:'#F5A623', error:'#E53535', done:'#18E299' }[dotState] || '#18E299';
  const dotAnim  = dotState === 'working' ? 'logo-dot-blink 1s step-end infinite'
                 : dotState === 'error'   ? 'logo-dot-blink 0.7s step-end infinite'
                 : dotState === 'done'    ? 'logo-dot-done 0.5s ease-in-out 3'
                 : 'none';
  const label    = { idle:'Idle', working:'Syncing…', error:'Error', done:'Synced 2m ago' }[dotState] || 'Synced 2m ago';
  return (
    <div title={`Docent · ${label}`} style={{ height:24, display:'inline-flex', alignItems:'center', padding:'0 9px', gap:6, borderRadius:9999, border:`1.5px solid ${T.logoBorder}`, background:T.bg }}>
      <span style={{ width:6, height:6, borderRadius:'50%', background:dotColor, flexShrink:0, animation:dotAnim }} />
      <span style={{ fontFamily:SANS, fontSize:11.5, fontWeight:600, color:T.fg1, letterSpacing:'-0.2px', lineHeight:1 }}>docent</span>
    </div>
  );
}

// ─── STATUS BADGE ─────────────────────────────────────────────────────────────
function StatusBadge({ status }) {
  const T = useTheme();
  const cfg = (T.dark ? STATUS_CFG_DARK : STATUS_CFG)[status] || STATUS_CFG[status];
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:5, background:cfg.bg, color:cfg.text, padding:'3px 10px', borderRadius:9999, fontFamily:MONO, fontSize:11, fontWeight:600, letterSpacing:'0.5px', textTransform:'uppercase', whiteSpace:'nowrap' }}>
      <span style={{ width:5, height:5, borderRadius:'50%', background:cfg.dot, flexShrink:0 }} />
      {status}
    </span>
  );
}

// ─── PRIORITY DOT ─────────────────────────────────────────────────────────────
function PriorityDot({ priority }) {
  const T = useTheme();
  const color = PRIORITY_COLOR[priority];
  return (
    <div style={{ display:'flex', alignItems:'center', gap:7 }}>
      <span style={{ width:7, height:7, borderRadius:'50%', background:color, flexShrink:0, ...(priority === 'High' ? { animation:'pulse-high 2s ease infinite' } : {}) }} />
      <span style={{ fontFamily:SANS, fontSize:13, color:T.fg3, fontWeight:500 }}>{priority}</span>
    </div>
  );
}

// ─── GHOST BUTTON ─────────────────────────────────────────────────────────────
function GhostBtn({ icon, children, onClick }) {
  const T = useTheme();
  const [hov, setHov] = React.useState(false);
  return (
    <button onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} onClick={onClick} style={{ display:'inline-flex', alignItems:'center', gap:6, padding:'5px 12px', borderRadius:9999, border:`1px solid ${T.borderMd}`, background: hov ? T.gray100 : 'transparent', color:T.fg2, fontFamily:SANS, fontSize:13, fontWeight:500, cursor:'pointer', transition:'background 0.12s', whiteSpace:'nowrap' }}>
      {icon && <span style={{ color:T.fg4, display:'flex' }}>{icon}</span>}
      {children}
    </button>
  );
}

// ─── ICON BUTTON ──────────────────────────────────────────────────────────────
function IconBtn({ icon, title, color, onClick }) {
  const T = useTheme();
  const [hov, setHov] = React.useState(false);
  return (
    <button className="btn-icon" title={title} onClick={onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{ display:'inline-flex', alignItems:'center', justifyContent:'center', width:28, height:28, borderRadius:6, border:'none', background: hov ? T.gray100 : 'transparent', color: color || T.fg4, cursor:'pointer', transition:'background 0.12s' }}>
      {icon}
    </button>
  );
}

// ─── PAPER ROW ────────────────────────────────────────────────────────────────
function PaperRow({ paper, onMarkDone, onEdit, onDelete, isNew, showTags, compact, accent }) {
  const T = useTheme();
  const [hov, setHov] = React.useState(false);
  const pad = compact ? '8px 20px' : '14px 20px';
  const padSm = compact ? '8px 16px' : '14px 16px';
  return (
    <tr className={isNew ? 'row-fade' : ''} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{ borderBottom:`1px solid ${T.border}`, background: hov ? T.rowHover : 'transparent' }}>
      <td style={{ padding:pad, verticalAlign:'top' }}>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontFamily:SANS, fontSize:14, fontWeight:500, color:T.fg1, lineHeight:1.4, display:'flex', alignItems:'center', gap:6, flexWrap:'wrap' }}>
            <span style={{ textWrap:'pretty' }}>{paper.title}</span>
            <span style={{ color:T.fg4, display:'flex', cursor:'pointer', flexShrink:0, opacity:0.5 }}><Ico.ExternalLink /></span>
          </div>
          <div style={{ marginTop:3, fontFamily:SANS, fontSize:12, color:T.fg3, lineHeight:1.5, display:'flex', alignItems:'center', gap:6, flexWrap:'wrap' }}>
            <span>{paper.authors}</span>
            <span style={{ color:T.gray200 }}>·</span>
            <span style={{ fontFamily:MONO, fontSize:10, color:T.fg4, letterSpacing:'0.4px', textTransform:'uppercase' }}>{paper.venue} {paper.year}</span>
          </div>
          {showTags && paper.tags.length > 0 && (
            <div style={{ marginTop:6, display:'flex', gap:4, flexWrap:'wrap' }}>
              {paper.tags.map(tag => (
                <span key={tag} style={{ padding:'1px 8px', borderRadius:9999, background:T.gray100, color:T.fg4, fontFamily:MONO, fontSize:10, letterSpacing:'0.3px', textTransform:'uppercase' }}>{tag}</span>
              ))}
            </div>
          )}
        </div>
      </td>
      <td style={{ padding:padSm, verticalAlign:'middle', whiteSpace:'nowrap' }}>
        <StatusBadge status={paper.status} />
      </td>
      <td style={{ padding:padSm, verticalAlign:'middle', whiteSpace:'nowrap' }}>
        <PriorityDot priority={paper.priority} />
      </td>
      <td style={{ padding:padSm, verticalAlign:'middle', whiteSpace:'nowrap' }}>
        <span style={{ fontFamily:MONO, fontSize:11, color:T.fg4, letterSpacing:'0.3px' }}>{paper.addedDate}</span>
      </td>
      <td style={{ padding:padSm, verticalAlign:'middle', textAlign:'right' }}>
        <div className="row-actions" style={{ display:'inline-flex', alignItems:'center', gap:2 }}>
          <IconBtn icon={<Ico.CheckCircle />} title="Mark Done" color={BRAND_DEEP} onClick={() => onMarkDone(paper.id)} />
          <IconBtn icon={<Ico.Edit2 />}       title="Edit"      color={T.fg4}       onClick={() => onEdit(paper.id)} />
          <IconBtn icon={<Ico.Trash2 />}      title="Delete"    color="#D45656"     onClick={() => onDelete(paper.id)} />
        </div>
      </td>
    </tr>
  );
}

// ─── ADD PAPER MODAL ──────────────────────────────────────────────────────────
function AddPaperModal({ onClose, onAdd, accent }) {
  const T = useTheme();
  const [form, setForm] = React.useState({ title:'', authors:'', year:'', venue:'', status:'Queued', priority:'Medium', tags:'' });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const inputStyle = { width:'100%', padding:'8px 12px', border:`1px solid ${T.borderMd}`, borderRadius:8, fontFamily:SANS, fontSize:13, color:T.fg1, background:T.bg, outline:'none', transition:'border-color 0.15s' };
  const labelStyle = { fontFamily:SANS, fontSize:12, fontWeight:500, color:T.fg3, display:'block', marginBottom:5 };

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.2)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:100 }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background:T.card, borderRadius:16, width:480, border:`1px solid ${T.border}`, boxShadow:'rgba(0,0,0,0.12) 0px 8px 32px', overflow:'hidden' }}>
        <div style={{ padding:'20px 24px 16px', borderBottom:`1px solid ${T.border}` }}>
          <div style={{ fontFamily:SANS, fontSize:15, fontWeight:600, color:T.fg1 }}>Add Paper</div>
          <div style={{ fontFamily:SANS, fontSize:13, color:T.fg3, marginTop:2 }}>Add a paper to your reading queue</div>
        </div>
        <div style={{ padding:'20px 24px', display:'flex', flexDirection:'column', gap:14 }}>
          <div><label style={labelStyle}>Title</label><input style={inputStyle} placeholder="Paper title" value={form.title} onChange={e => set('title', e.target.value)} /></div>
          <div><label style={labelStyle}>Authors</label><input style={inputStyle} placeholder="Last, F. · Last, F." value={form.authors} onChange={e => set('authors', e.target.value)} /></div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            <div><label style={labelStyle}>Year</label><input style={inputStyle} placeholder="2024" value={form.year} onChange={e => set('year', e.target.value)} /></div>
            <div><label style={labelStyle}>Venue</label><input style={inputStyle} placeholder="NeurIPS / arXiv" value={form.venue} onChange={e => set('venue', e.target.value)} /></div>
          </div>
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
            <div><label style={labelStyle}>Status</label>
              <select style={{ ...inputStyle, cursor:'pointer' }} value={form.status} onChange={e => set('status', e.target.value)}>
                <option>Queued</option><option>Reading</option><option>Done</option>
              </select></div>
            <div><label style={labelStyle}>Priority</label>
              <select style={{ ...inputStyle, cursor:'pointer' }} value={form.priority} onChange={e => set('priority', e.target.value)}>
                <option>Low</option><option>Medium</option><option>High</option>
              </select></div>
          </div>
          <div><label style={labelStyle}>Tags <span style={{ color:T.fg4, fontWeight:400 }}>(comma separated)</span></label>
            <input style={inputStyle} placeholder="NLP, transformers" value={form.tags} onChange={e => set('tags', e.target.value)} /></div>
        </div>
        <div style={{ padding:'12px 24px 20px', display:'flex', justifyContent:'flex-end', gap:8 }}>
          <GhostBtn onClick={onClose}>Cancel</GhostBtn>
          <button onClick={() => {
            if (!form.title.trim()) return;
            onAdd({ id:Date.now(), title:form.title, authors:form.authors || 'Unknown Author', year:parseInt(form.year)||new Date().getFullYear(), venue:form.venue||'—', status:form.status, priority:form.priority, tags:form.tags ? form.tags.split(',').map(t=>t.trim()).filter(Boolean) : [], addedDate:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) });
          }} style={{ display:'inline-flex', alignItems:'center', gap:6, padding:'7px 18px', borderRadius:9999, background:accent, color:'#0d0d0d', fontFamily:SANS, fontSize:13, fontWeight:600, border:'none', cursor:'pointer' }}>
            <Ico.Plus /> Add Paper
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [papers, setPapers]     = React.useState(SAMPLE_PAPERS);
  const [showModal, setModal]   = React.useState(false);
  const [newIds, setNewIds]     = React.useState(new Set());
  const [filter, setFilter]     = React.useState('All');
  const [search, setSearch]     = React.useState('');

  const [tweaks, setTweak] = window.useTweaks(/*EDITMODE-BEGIN*/{
    "accentColor": "#18e299",
    "compactRows": false,
    "showTags": true,
    "dotState": "done",
    "sidebarWidth": 220,
    "darkMode": false
  }/*EDITMODE-END*/);

  const dark   = !!tweaks.darkMode;
  const accent = tweaks.accentColor || BRAND;
  const T      = React.useMemo(() => makeTheme(dark), [dark]);

  const stats = { queue: papers.filter(p => p.status !== 'Done').length, database:45, mendeley:40 };
  const FILTERS = ['All','Reading','Queued','Done'];

  const filtered = papers.filter(p => {
    const matchF = filter === 'All' || p.status === filter;
    const q = search.toLowerCase();
    const matchS = !q || p.title.toLowerCase().includes(q) || p.authors.toLowerCase().includes(q);
    return matchF && matchS;
  });

  function handleMarkDone(id) { setPapers(ps => ps.map(p => p.id === id ? { ...p, status:'Done' } : p)); }
  function handleDelete(id)   { setPapers(ps => ps.filter(p => p.id !== id)); }
  function handleAdd(paper)   {
    setPapers(ps => [paper, ...ps]);
    setNewIds(s => new Set([...s, paper.id]));
    setModal(false);
    setTimeout(() => setNewIds(s => { const n = new Set(s); n.delete(paper.id); return n; }), 600);
  }

  return (
    <ThemeCtx.Provider value={T}>
      <div style={{ display:'flex', height:'100vh', width:'100vw', overflow:'hidden', background:T.bg, color:T.fg1, transition:'background 0.2s, color 0.2s' }}>

        {/* SIDEBAR */}
        <aside style={{ width:tweaks.sidebarWidth||220, flexShrink:0, height:'100%', borderRight:`1px solid ${T.border}`, background:T.bg, display:'flex', flexDirection:'column', transition:'width 0.2s ease', overflow:'hidden' }}>
          <div style={{ height:56, display:'flex', alignItems:'center', padding:'0 18px', borderBottom:`1px solid ${T.border}`, flexShrink:0 }}>
            <DocentWordmark />
          </div>
          <nav style={{ flex:1, padding:'10px 8px', display:'flex', flexDirection:'column', gap:2 }}>
            {NAV.map(({ id, label, icon }) => {
              const active = id === 'papers';
              return (
                <button key={id} style={{ width:'100%', display:'flex', alignItems:'center', gap:9, padding:'7px 10px', borderRadius:8, border:'none', cursor:'pointer', fontFamily:SANS, fontSize:13, fontWeight:active?500:400, color:active ? BRAND_DEEP : T.fg3, background:active ? accent+'22' : 'transparent', transition:'background 0.1s, color 0.1s', textAlign:'left' }}>
                  <span style={{ color:active ? BRAND_DEEP : T.fg4, display:'flex', flexShrink:0 }}>{icon}</span>
                  {label}
                  {active && <span style={{ marginLeft:'auto', fontFamily:MONO, fontSize:9, color:BRAND_DEEP, background:accent+'33', padding:'1px 6px', borderRadius:9999, letterSpacing:'0.3px', textTransform:'uppercase', fontWeight:600 }}>{papers.length}</span>}
                </button>
              );
            })}
          </nav>
          <div style={{ padding:'12px 18px', borderTop:`1px solid ${T.border}`, display:'flex', alignItems:'center', gap:8 }}>
            <div style={{ width:28, height:28, borderRadius:'50%', background:accent+'22', color:BRAND_DEEP, display:'flex', alignItems:'center', justifyContent:'center', fontFamily:SANS, fontSize:12, fontWeight:600, flexShrink:0 }}>A</div>
            <div>
              <div style={{ fontFamily:SANS, fontSize:12, fontWeight:500, color:T.fg1 }}>Alex R.</div>
              <div style={{ fontFamily:SANS, fontSize:11, color:T.fg4 }}>alex@lab.edu</div>
            </div>
          </div>
        </aside>

        {/* MAIN */}
        <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0, overflow:'hidden' }}>

          {/* STATUS BANNER */}
          <div style={{ height:40, flexShrink:0, background:T.surface, borderBottom:`1px solid ${T.border}`, display:'flex', alignItems:'center', padding:'0 24px', gap:24 }}>
            {[{label:'QUEUE',value:stats.queue},{label:'DATABASE',value:stats.database},{label:'MENDELEY',value:stats.mendeley}].map(({ label, value }) => (
              <div key={label} style={{ display:'flex', alignItems:'center', gap:7 }}>
                <span style={{ fontFamily:MONO, fontSize:10, fontWeight:500, color:T.fg4, letterSpacing:'0.7px', textTransform:'uppercase' }}>{label}</span>
                <span style={{ fontFamily:MONO, fontSize:11, fontWeight:600, color:T.fg1, letterSpacing:'0.4px' }}>{value}</span>
              </div>
            ))}
            <div style={{ flex:1 }} />
            {/* Dark mode toggle */}
            <button onClick={() => setTweak('darkMode', !dark)} style={{ display:'flex', alignItems:'center', gap:5, padding:'3px 10px', borderRadius:9999, border:`1px solid ${T.borderMd}`, background:'transparent', cursor:'pointer', fontFamily:MONO, fontSize:10, letterSpacing:'0.5px', textTransform:'uppercase', color:T.fg3, transition:'all 0.15s' }}>
              {dark ? <Ico.Sun /> : <Ico.Moon />}
              {dark ? 'Light' : 'Dark'}
            </button>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <span style={{ fontFamily:MONO, fontSize:10, color:T.fg4, letterSpacing:'0.5px', textTransform:'uppercase' }}>
                {tweaks.dotState === 'working' ? 'Syncing…' : tweaks.dotState === 'error' ? 'Sync error' : 'Synced 2m ago'}
              </span>
              <StatusIndicator dotState={tweaks.dotState} />
            </div>
          </div>

          {/* PAGE HEADER */}
          <div style={{ padding:'20px 24px 0', borderBottom:`1px solid ${T.border}` }}>
            <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:16 }}>
              <div>
                <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:4 }}>
                  <span style={{ color:BRAND_DEEP, display:'flex' }}><Ico.BookOpen /></span>
                  <h1 style={{ fontFamily:SANS, fontSize:18, fontWeight:600, color:T.fg1, letterSpacing:'-0.3px' }}>Reading</h1>
                </div>
                <p style={{ fontFamily:SANS, fontSize:13, color:T.fg3, marginBottom:14 }}>Local reading queue · {papers.length} papers</p>
              </div>
              <button onClick={() => setModal(true)} style={{ display:'inline-flex', alignItems:'center', gap:6, padding:'7px 18px', borderRadius:9999, background:accent, color:'#0d0d0d', fontFamily:SANS, fontSize:13, fontWeight:600, border:'none', cursor:'pointer', flexShrink:0 }}>
                <Ico.Plus /> Add Paper
              </button>
            </div>

            {/* ACTION BAR */}
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', paddingBottom:0 }}>
              <div style={{ display:'flex', alignItems:'center', gap:6 }}>
                <GhostBtn icon={<Ico.FolderOpen />}>Scan folder</GhostBtn>
                <GhostBtn icon={<Ico.RefreshCw />}>Sync Mendeley</GhostBtn>
                <GhostBtn icon={<Ico.Upload />}>Export</GhostBtn>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <div style={{ position:'relative', display:'flex', alignItems:'center' }}>
                  <span style={{ position:'absolute', left:10, color:T.fg4, display:'flex', pointerEvents:'none' }}><Ico.Search /></span>
                  <input placeholder="Search papers…" value={search} onChange={e => setSearch(e.target.value)} style={{ padding:'5px 12px 5px 32px', borderRadius:9999, border:`1px solid ${T.borderMd}`, fontFamily:SANS, fontSize:12, color:T.fg1, background:T.bg, outline:'none', width:180 }} />
                </div>
                <GhostBtn icon={<Ico.Filter />}>Filter</GhostBtn>
              </div>
            </div>

            {/* FILTER TABS */}
            <div style={{ display:'flex', gap:0, marginTop:12 }}>
              {FILTERS.map(tab => {
                const active = filter === tab;
                const count = tab === 'All' ? papers.length : papers.filter(p => p.status === tab).length;
                return (
                  <button key={tab} onClick={() => setFilter(tab)} style={{ padding:'8px 14px', border:'none', background:'transparent', fontFamily:SANS, fontSize:13, fontWeight:active?500:400, color:active ? T.fg1 : T.fg4, borderBottom: active ? `2px solid ${accent}` : '2px solid transparent', cursor:'pointer', transition:'all 0.12s', display:'flex', alignItems:'center', gap:6 }}>
                    {tab}
                    <span style={{ fontFamily:MONO, fontSize:10, background:active ? T.gray100 : 'transparent', color:active ? T.fg2 : T.fg4, padding:'1px 6px', borderRadius:9999, transition:'all 0.12s' }}>{count}</span>
                  </button>
                );
              })}
            </div>
          </div>

          {/* TABLE */}
          <div style={{ flex:1, overflowY:'auto' }}>
            {filtered.length === 0 ? (
              <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:200, gap:10, color:T.fg4 }}>
                <span style={{ display:'flex', opacity:0.4 }}><Ico.BookOpen /></span>
                <span style={{ fontFamily:SANS, fontSize:13 }}>No papers found</span>
              </div>
            ) : (
              <table style={{ width:'100%', borderCollapse:'collapse' }}>
                <thead>
                  <tr style={{ borderBottom:`1px solid ${T.border}` }}>
                    {['Paper','Status','Priority','Added',''].map((col, i) => (
                      <th key={i} style={{ padding:'9px 16px', textAlign: i===4 ? 'right' : 'left', fontFamily:MONO, fontSize:10, fontWeight:500, color:T.fg4, letterSpacing:'0.6px', textTransform:'uppercase', background:T.bg, position:'sticky', top:0, zIndex:1, borderBottom:`1px solid ${T.border}`, ...(i===0 ? {paddingLeft:20} : {}) }}>{col}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(paper => (
                    <PaperRow key={paper.id} paper={paper} isNew={newIds.has(paper.id)} onMarkDone={handleMarkDone} onEdit={() => {}} onDelete={handleDelete} showTags={tweaks.showTags} compact={tweaks.compactRows} accent={accent} />
                  ))}
                </tbody>
              </table>
            )}
          </div>
        </div>

        {showModal && <AddPaperModal onClose={() => setModal(false)} onAdd={handleAdd} accent={accent} />}

        <window.TweaksPanel>
          <window.TweakToggle label="Dark Mode"     value={tweaks.darkMode}    onChange={v => setTweak('darkMode', v)} />
          <window.TweakColor  label="Accent Color"  value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
          <window.TweakToggle label="Compact Rows"  value={tweaks.compactRows} onChange={v => setTweak('compactRows', v)} />
          <window.TweakToggle label="Show Tags"     value={tweaks.showTags}    onChange={v => setTweak('showTags', v)} />
          <window.TweakSelect label="Logo Dot State" value={tweaks.dotState}   options={['idle','working','error','done']} onChange={v => setTweak('dotState', v)} />
          <window.TweakSlider label="Sidebar Width" value={tweaks.sidebarWidth} min={160} max={280} step={10} onChange={v => setTweak('sidebarWidth', v)} />
        </window.TweaksPanel>
      </div>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
