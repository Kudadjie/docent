<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio — Docent</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; width: 100%; overflow: hidden; }
body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(128,128,128,0.2); border-radius: 4px; }

@keyframes fadeInUp { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
@keyframes logo-dot-blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes log-pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
@keyframes dot-bounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-2px);opacity:1} }

.log-line { animation: fadeInUp 0.15s ease forwards; }
.log-line.live { animation: fadeInUp 0.15s ease forwards, log-pulse 1.2s ease-in-out infinite 0.15s; }
.btn-hover:hover { background: var(--hover-bg) !important; }
.tap { transition: transform 0.05s ease, background 0.12s ease; }
.tap:active { transform: scale(0.98); }
.collapsible-toggle:hover .chev { transform: translateX(1px); }
.thinking-dot { display:inline-block; width:3px; height:3px; border-radius:50%; background:currentColor; margin:0 1px; animation: dot-bounce 1.2s ease-in-out infinite; }
.thinking-dot:nth-child(2) { animation-delay: 0.15s; }
.thinking-dot:nth-child(3) { animation-delay: 0.3s; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const SANS = "'Inter', system-ui, sans-serif";
const MONO = "'Geist Mono', ui-monospace, monospace";
const BRAND = '#18E299';
const BRAND_DEEP = '#0fa76e';
const BRAND_LIGHT = '#d4fae8';
const AMBER = '#C37D0D';
const AMBER_BG = '#FFF7ED';
const AMBER_BORDER = '#F59E0B';
const RED = '#D45656';

// ─── THEME FACTORY ────────────────────────────────────────────────────────────
function makeTheme(dark) {
  return {
    bg:        dark ? '#0d0d0d' : '#ffffff',
    surface:   dark ? '#111111' : '#fafafa',
    card:      dark ? '#141414' : '#ffffff',
    fg1:       dark ? '#ededed' : '#0d0d0d',
    fg2:       dark ? '#c0c0c0' : '#333333',
    fg3:       dark ? '#a0a0a0' : '#666666',
    fg4:       dark ? '#606060' : '#888888',
    gray100:   dark ? '#1e1e1e' : '#f5f5f5',
    gray200:   dark ? '#2a2a2a' : '#e5e5e5',
    border:    dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)',
    borderMd:  dark ? 'rgba(255,255,255,0.10)' : 'rgba(0,0,0,0.09)',
    logoBorder:dark ? 'rgba(255,255,255,0.22)' : '#0d0d0d',
    rowHover:  dark ? '#1a1a1a' : '#fafafa',
    amberBg:   dark ? 'rgba(245,158,11,0.10)' : '#FFF7ED',
    amberText: dark ? '#F5A623' : '#B45309',
    redBg:     dark ? 'rgba(212,86,86,0.12)' : '#FEF2F2',
    redText:   dark ? '#F87171' : '#B91C1C',
    blueBg:    dark ? 'rgba(59,130,246,0.12)' : '#EFF6FF',
    blueText:  dark ? '#60A5FA' : '#1D4ED8',
    codeBg:    dark ? '#0a0a0a' : '#fafafa',
    dark,
  };
}
const ThemeCtx = React.createContext(makeTheme(false));
const useTheme = () => React.useContext(ThemeCtx);

// ─── ICONS (Lucide) ───────────────────────────────────────────────────────────
const ico = (paths, size=16, sw=1.5) => () => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"
       strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round">{paths}</svg>
);
const Ico = {
  LayoutDashboard: ico(<>
    <rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/>
    <rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/>
  </>),
  BookOpen: ico(<>
    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
  </>),
  FlaskConical: ico(<>
    <path d="M10 2v7.31"/><path d="M14 9.3V1.99"/><path d="M8.5 2h7"/>
    <path d="M14 9.3a6.5 6.5 0 1 1-4 0"/><path d="M5.52 16h12.96"/>
  </>),
  Play: ico(<polygon points="6 3 20 12 6 21 6 3"/>, 13, 2),
  Square: ico(<rect x="5" y="5" width="14" height="14" rx="1"/>, 12, 2),
  CheckCircle: ico(<>
    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
    <polyline points="22 4 12 14.01 9 11.01"/>
  </>),
  XCircle: ico(<>
    <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/>
    <line x1="9" y1="9" x2="15" y2="15"/>
  </>),
  AlertTriangle: ico(<>
    <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
    <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
  </>, 14, 2),
  Copy: ico(<>
    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
  </>, 12, 1.6),
  Plus: ico(<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>, 14, 2),
  ChevronDown: ico(<polyline points="6 9 12 15 18 9"/>, 14, 2),
  ChevronRight: ico(<polyline points="9 18 15 12 9 6"/>, 14, 2),
  Search: ico(<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>, 14),
  ExternalLink: ico(<>
    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
    <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
  </>, 12),
  File: ico(<><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></>, 13),
  X: ico(<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>, 12, 2),
  Sun: ico(<>
    <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
    <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
    <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
  </>, 12, 2),
  Moon: ico(<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>, 12, 2),
  Book: ico(<>
    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
  </>, 14),
  Database: ico(<>
    <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
  </>, 13),
};

// ─── ACTIONS DEFINITION ───────────────────────────────────────────────────────
const ACTIONS = {
  research: {
    label: 'Research',
    items: [
      { id:'deep',     label:'Deep research',     form:'topic' },
      { id:'lit',      label:'Literature review', form:'topic' },
      { id:'peer',     label:'Peer review',       form:'artifact' },
      { id:'compare',  label:'Compare',           form:'compare' },
      { id:'draft',    label:'Draft',             form:'topic' },
      { id:'replicate',label:'Replicate',         form:'artifact' },
      { id:'audit',    label:'Audit',             form:'artifact' },
    ],
  },
  utilities: {
    label: 'Utilities',
    items: [
      { id:'search',     label:'Search papers',    form:'search' },
      { id:'getpaper',   label:'Get paper',        form:'getpaper' },
      { id:'scholarly',  label:'Scholarly search', form:'search' },
      { id:'notebook',   label:'To notebook',      form:'notebook' },
    ],
  },
  config: {
    label: 'Config',
    items: [
      { id:'cfgshow', label:'Show config',    form:'cfgshow' },
      { id:'cfgset',  label:'Set config key', form:'cfgset' },
    ],
  },
};
const ALL_ACTIONS = Object.values(ACTIONS).flatMap(g => g.items);
const findAction = (id) => ALL_ACTIONS.find(a => a.id === id) || ALL_ACTIONS[0];

const BACKENDS = ['Free','Feynman','Docent','Groq','Gemini','OpenRouter','Anthropic','OpenAI','Ollama','LM Studio'];

// ─── PRIMITIVE COMPONENTS ─────────────────────────────────────────────────────

function PrimaryBtn({ icon, children, onClick, disabled, full }) {
  return (
    <button onClick={onClick} disabled={disabled} className="tap"
      style={{ display:'inline-flex', alignItems:'center', justifyContent:'center', gap:7,
        padding:'9px 18px', borderRadius:9999, background: disabled ? '#a8e8cf' : BRAND,
        color:'#0d0d0d', fontFamily:SANS, fontSize:13, fontWeight:600, border:'none',
        cursor: disabled?'not-allowed':'pointer', width: full?'100%':'auto', opacity: disabled?0.7:1 }}>
      {icon}
      {children}
    </button>
  );
}

function GhostBtn({ icon, children, onClick, size='md', danger }) {
  const T = useTheme();
  const [hov, setHov] = React.useState(false);
  const pad = size === 'sm' ? '4px 10px' : '5px 12px';
  return (
    <button onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} onClick={onClick}
      style={{ display:'inline-flex', alignItems:'center', gap:6, padding:pad, borderRadius:9999,
        border:`1px solid ${T.borderMd}`, background: hov ? T.gray100 : 'transparent',
        color: danger ? RED : T.fg2, fontFamily:SANS, fontSize:13, fontWeight:500,
        cursor:'pointer', transition:'background 0.12s', whiteSpace:'nowrap' }}>
      {icon && <span style={{ color: danger ? RED : T.fg4, display:'flex' }}>{icon}</span>}
      {children}
    </button>
  );
}

function PillToggle({ active, onClick, disabled, tooltip, children }) {
  const T = useTheme();
  const [hov, setHov] = React.useState(false);
  return (
    <button onClick={disabled?null:onClick} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      title={tooltip}
      style={{ padding:'5px 12px', borderRadius:9999,
        border: active ? `1px solid ${BRAND}` : `1px solid ${T.borderMd}`,
        background: active ? BRAND : (hov && !disabled ? T.gray100 : 'transparent'),
        color: active ? '#0d0d0d' : (disabled ? T.fg4 : T.fg2),
        fontFamily:SANS, fontSize:12, fontWeight:500,
        cursor: disabled?'not-allowed':'pointer', opacity:disabled?0.55:1,
        transition:'all 0.12s', whiteSpace:'nowrap' }}>
      {children}
    </button>
  );
}

function Segmented({ value, onChange, options }) {
  const T = useTheme();
  return (
    <div style={{ display:'inline-flex', padding:2, background:T.gray100, borderRadius:9999,
        border:`1px solid ${T.border}` }}>
      {options.map(opt => {
        const active = opt === value;
        return (
          <button key={opt} onClick={()=>onChange(opt)}
            style={{ padding:'4px 14px', borderRadius:9999, border:'none',
              background: active ? T.bg : 'transparent',
              color: active ? T.fg1 : T.fg3,
              fontFamily:SANS, fontSize:12, fontWeight: active?500:400, cursor:'pointer',
              transition:'all 0.12s',
              boxShadow: active ? '0 1px 2px rgba(0,0,0,0.06)' : 'none' }}>{opt}</button>
        );
      })}
    </div>
  );
}

function Input({ value, onChange, placeholder, type='text', mono }) {
  const T = useTheme();
  const [focus, setFocus] = React.useState(false);
  return (
    <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      onFocus={()=>setFocus(true)} onBlur={()=>setFocus(false)}
      style={{ width:'100%', padding:'8px 12px',
        border:`1px solid ${focus?BRAND:T.borderMd}`, borderRadius:8,
        fontFamily: mono ? MONO : SANS, fontSize:13, color:T.fg1, background:T.bg,
        outline:'none', transition:'border-color 0.15s' }} />
  );
}

function Label({ children, hint }) {
  const T = useTheme();
  return (
    <label style={{ display:'block', marginBottom:6, fontFamily:SANS, fontSize:12,
        fontWeight:500, color:T.fg3 }}>
      {children}
      {hint && <span style={{ color:T.fg4, fontWeight:400, marginLeft:6 }}>{hint}</span>}
    </label>
  );
}

function Field({ label, hint, children }) {
  return (
    <div>
      <Label hint={hint}>{label}</Label>
      {children}
    </div>
  );
}

function Note({ tone='info', children }) {
  const T = useTheme();
  const bg = tone === 'warn' ? T.amberBg : T.gray100;
  const text = tone === 'warn' ? T.amberText : T.fg3;
  return (
    <div style={{ fontFamily:SANS, fontSize:11.5, color:text, padding:'6px 10px',
        borderRadius:6, background: tone==='warn'?bg:'transparent',
        borderLeft: tone==='warn' ? `2px solid ${AMBER_BORDER}` : 'none',
        marginTop:8, lineHeight:1.5 }}>
      {children}
    </div>
  );
}

function Toggle({ checked, onChange }) {
  const T = useTheme();
  return (
    <button onClick={()=>onChange(!checked)}
      style={{ width:30, height:18, borderRadius:9999, border:'none',
        background: checked ? BRAND : T.gray200,
        position:'relative', cursor:'pointer', padding:0,
        transition:'background 0.15s', flexShrink:0 }}>
      <span style={{ position:'absolute', top:2, left: checked?14:2,
        width:14, height:14, borderRadius:'50%', background:'#fff',
        boxShadow:'0 1px 2px rgba(0,0,0,0.2)', transition:'left 0.15s' }} />
    </button>
  );
}

function Stepper({ value, onChange, min=1, max=99 }) {
  const T = useTheme();
  return (
    <div style={{ display:'inline-flex', alignItems:'center',
        border:`1px solid ${T.borderMd}`, borderRadius:8, overflow:'hidden', background:T.bg }}>
      <button onClick={()=>onChange(Math.max(min, value-1))}
        style={{ width:28, height:30, border:'none', background:'transparent', cursor:'pointer',
          color:T.fg3, fontSize:16, fontFamily:SANS }}>−</button>
      <div style={{ width:36, textAlign:'center', fontFamily:MONO, fontSize:12,
          color:T.fg1, fontWeight:500, borderLeft:`1px solid ${T.border}`,
          borderRight:`1px solid ${T.border}`, padding:'7px 0' }}>{value}</div>
      <button onClick={()=>onChange(Math.min(max, value+1))}
        style={{ width:28, height:30, border:'none', background:'transparent', cursor:'pointer',
          color:T.fg3, fontSize:14, fontFamily:SANS }}>+</button>
    </div>
  );
}

function CodeBlock({ children, mono=true }) {
  const T = useTheme();
  const [copied, setCopied] = React.useState(false);
  const text = typeof children === 'string' ? children : '';
  return (
    <div style={{ position:'relative', background:T.codeBg, border:`1px solid ${T.border}`,
        borderRadius:8, padding:'10px 36px 10px 12px', fontFamily: mono?MONO:SANS,
        fontSize:11.5, color:T.fg2, lineHeight:1.55, letterSpacing:'0.2px',
        wordBreak:'break-all', whiteSpace:'pre-wrap' }}>
      {children}
      <button onClick={()=>{ if(text){ navigator.clipboard?.writeText(text); setCopied(true); setTimeout(()=>setCopied(false),1200);} }}
        title="Copy"
        style={{ position:'absolute', top:6, right:6, width:24, height:24, borderRadius:6,
          border:'none', background:'transparent', color: copied?BRAND_DEEP:T.fg4, cursor:'pointer',
          display:'flex', alignItems:'center', justifyContent:'center' }}>
        {copied ? <Ico.CheckCircle/> : <Ico.Copy/>}
      </button>
    </div>
  );
}

function Chip({ color, children }) {
  const T = useTheme();
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:5,
        padding:'4px 10px', borderRadius:9999,
        background: color ? color+'1f' : T.gray100,
        color: color || T.fg2,
        fontFamily:MONO, fontSize:11, fontWeight:600, letterSpacing:'0.4px',
        textTransform:'uppercase' }}>
      {children}
    </span>
  );
}

// ─── DOCENT WORDMARK ──────────────────────────────────────────────────────────
function DocentWordmark() {
  const T = useTheme();
  const src = T.dark ? '../assets/logo-light.svg' : '../assets/logo.svg';
  return <img src={src} alt="Docent" style={{ height:24, display:'block' }} />;
}
function StatusIndicator({ dotState='idle' }) {
  const T = useTheme();
  const dotColor = { idle:BRAND, working:'#F5A623', error:'#E53535', done:BRAND }[dotState];
  const dotAnim = dotState === 'working' ? 'logo-dot-blink 1s step-end infinite'
                : dotState === 'error'   ? 'logo-dot-blink 0.7s step-end infinite' : 'none';
  return (
    <div style={{ height:24, display:'inline-flex', alignItems:'center', padding:'0 9px', gap:6,
        borderRadius:9999, border:`1.5px solid ${T.logoBorder}`, background:T.bg }}>
      <span style={{ width:6, height:6, borderRadius:'50%', background:dotColor,
        animation:dotAnim }} />
      <span style={{ fontFamily:SANS, fontSize:11.5, fontWeight:600, color:T.fg1,
        letterSpacing:'-0.2px', lineHeight:1 }}>docent</span>
    </div>
  );
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
function Sidebar({ active, onNav }) {
  const T = useTheme();
  const items = [
    { id:'dashboard', label:'Dashboard', Icon: Ico.LayoutDashboard, count:null },
    { id:'reading',   label:'Reading',   Icon: Ico.BookOpen,        count:12 },
    { id:'studio',    label:'Studio',    Icon: Ico.FlaskConical,    count:null },
  ];
  return (
    <aside style={{ width:220, flexShrink:0, height:'100%',
        borderRight:`1px solid ${T.border}`, background:T.bg,
        display:'flex', flexDirection:'column', overflow:'hidden' }}>
      <div style={{ height:56, display:'flex', alignItems:'center', padding:'0 18px',
          borderBottom:`1px solid ${T.border}`, flexShrink:0 }}>
        <DocentWordmark />
      </div>
      <nav style={{ flex:1, padding:'10px 8px', display:'flex', flexDirection:'column', gap:2 }}>
        {items.map(({ id, label, Icon, count }) => {
          const isActive = id === active;
          return (
            <button key={id} onClick={()=>onNav?.(id)}
              style={{ width:'100%', display:'flex', alignItems:'center', gap:9,
                padding:'7px 10px', borderRadius:8, border:'none', cursor:'pointer',
                fontFamily:SANS, fontSize:13, fontWeight: isActive?500:400,
                color: isActive ? BRAND_DEEP : T.fg3,
                background: isActive ? BRAND+'22' : 'transparent',
                transition:'background 0.1s, color 0.1s', textAlign:'left' }}>
              <span style={{ color: isActive ? BRAND_DEEP : T.fg4, display:'flex', flexShrink:0 }}>
                <Icon/>
              </span>
              {label}
              {isActive && count != null && (
                <span style={{ marginLeft:'auto', fontFamily:MONO, fontSize:9,
                  color:BRAND_DEEP, background:BRAND+'33', padding:'1px 6px',
                  borderRadius:9999, letterSpacing:'0.3px', textTransform:'uppercase',
                  fontWeight:600 }}>{count}</span>
              )}
            </button>
          );
        })}
      </nav>
      <div style={{ padding:'12px 18px', borderTop:`1px solid ${T.border}`,
          display:'flex', alignItems:'center', gap:8 }}>
        <div style={{ width:28, height:28, borderRadius:'50%', background:BRAND+'22',
            color:BRAND_DEEP, display:'flex', alignItems:'center', justifyContent:'center',
            fontFamily:SANS, fontSize:12, fontWeight:600, flexShrink:0 }}>A</div>
        <div>
          <div style={{ fontFamily:SANS, fontSize:12, fontWeight:500, color:T.fg1 }}>Alex R.</div>
          <div style={{ fontFamily:SANS, fontSize:11, color:T.fg4 }}>alex@lab.edu</div>
        </div>
      </div>
    </aside>
  );
}

function StatusBanner({ dark, setDark }) {
  const T = useTheme();
  const stats = [
    { label:'QUEUE', value:12 }, { label:'DATABASE', value:45 }, { label:'MENDELEY', value:40 },
  ];
  return (
    <div style={{ height:40, flexShrink:0, background:T.surface,
        borderBottom:`1px solid ${T.border}`, display:'flex', alignItems:'center',
        padding:'0 24px', gap:24 }}>
      {stats.map(({ label, value }) => (
        <div key={label} style={{ display:'flex', alignItems:'center', gap:7 }}>
          <span style={{ fontFamily:MONO, fontSize:10, fontWeight:500, color:T.fg4,
            letterSpacing:'0.7px', textTransform:'uppercase' }}>{label}</span>
          <span style={{ fontFamily:MONO, fontSize:11, fontWeight:600, color:T.fg1,
            letterSpacing:'0.4px' }}>{value}</span>
        </div>
      ))}
      <div style={{ flex:1 }} />

function LogLine({ phase, text, live }) {
  const T = useTheme();
  const tone = PHASE_TONE[phase] || 'info';
  const phaseColor = tone === 'warn' ? T.amberText : tone === 'error' ? T.redText : BRAND_DEEP;
  const phaseBg    = tone === 'warn' ? T.amberBg   : tone === 'error' ? T.redBg   : BRAND+'1c';
  const rowBg      = tone === 'warn' ? T.amberBg   : tone === 'error' ? T.redBg   : 'transparent';
  const rowBorder  = tone === 'warn' ? AMBER_BORDER : tone === 'error' ? '#E53535' : 'transparent';
  return (
    <div className={'log-line' + (live ? ' live' : '')}
      style={{ display:'flex', gap:10, padding:'5px 12px 5px 10px',
        background: rowBg, borderLeft: `2px solid ${rowBorder}`,
        borderRadius:'2px 4px 4px 2px', alignItems:'flex-start' }}>
      <span style={{ fontFamily:MONO, fontSize:9.5, fontWeight:600,
          letterSpacing:'0.6px', textTransform:'uppercase',
          color: phaseColor, background: phaseBg, padding:'2px 6px', borderRadius:4,
          flexShrink:0, marginTop:1 }}>
        {phase}
      </span>
      <span style={{ fontFamily:SANS, fontSize:12.5, color:T.fg2,
          lineHeight:1.5, flex:1, wordBreak:'break-word' }}>
        {text}

          <span style={{ marginLeft:4 }}>
            <span className="thinking-dot"/><span className="thinking-dot"/><span className="thinking-dot"/>

        )}
      </span>

  );
}

function OutputPanel({ action, state, status, logs, onStop, onReset }) {
  const T = useTheme();
  const breadcrumb = action.label + (
    state.topic ? ` · ${state.topic}` :
    state.query ? ` · ${state.query}` :
    state.artifact ? ` · ${state.artifact}` :
    state.artifactA && state.artifactB ? ` · ${state.artifactA} vs ${state.artifactB}` :
    state.arxivId ? ` · ${state.arxivId}` :
    state.cfgKey ? ` · ${state.cfgKey}` : ''
  );

  const isResult = status === 'success' || status === 'failure';
  const isRunning = status === 'running';
  const isEmpty = status === 'idle';

  // Result selection based on action
  function renderResult() {
    if (status === 'failure') return <ResultFailure />;
    switch (action.id) {
      case 'search':
      case 'scholarly':  return <ResultSearch query={state.query} />;
      case 'getpaper':   return <ResultGetPaper />;
      case 'notebook':   return <ResultNotebook />;
      case 'cfgshow':    return <ResultConfigShow />;
      case 'cfgset':     return <ResultConfigSet />;
      default:           return <ResultResearchSuccess topic={state.topic} />;
    }
  }

  const logRef = React.useRef(null);
  React.useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [logs.length]);

  return (
    <section style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0,
        background:T.bg, overflow:'hidden' }}>

      {/* Output header */}
      {!isEmpty && (
        <div style={{ flexShrink:0, padding:'14px 24px',
            borderBottom:`1px solid ${T.border}`,
            display:'flex', alignItems:'center', justifyContent:'space-between', gap:12 }}>
          <div style={{ display:'flex', alignItems:'center', gap:10, minWidth:0 }}>
            {isRunning && (
              <span style={{ width:8, height:8, borderRadius:'50%', background:BRAND,
                animation:'logo-dot-blink 1.2s step-end infinite', flexShrink:0 }} />
            )}
            <div style={{ display:'flex', alignItems:'center', gap:8, minWidth:0 }}>
              <span style={{ fontFamily:SANS, fontSize:13, fontWeight:500, color:T.fg1,
                  whiteSpace:'nowrap' }}>
                {action.label}
              </span>
              <span style={{ fontFamily:SANS, fontSize:13, color:T.gray200 }}>·</span>
              <span style={{ fontFamily:MONO, fontSize:11.5, color:T.fg3,
                  letterSpacing:'0.2px', overflow:'hidden', textOverflow:'ellipsis',
                  whiteSpace:'nowrap', minWidth:0 }}>
                {breadcrumb.replace(action.label + ' · ', '') || '—'}
              </span>
            </div>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            {isRunning && (
              <GhostBtn icon={<Ico.Square/>} onClick={onStop} danger>Stop</GhostBtn>
            )}
            {isResult && (
              <GhostBtn onClick={onReset}>Clear</GhostBtn>
            )}
          </div>
        </div>
      )}

      <div style={{ flex:1, overflowY:'auto', display:'flex', flexDirection:'column' }}>
        {isEmpty && <OutputEmpty />}

        {(isRunning || isResult) && logs.length > 0 && (
          <div ref={logRef} style={{ padding:'14px 22px',
              borderBottom: isResult ? `1px solid ${T.border}` : 'none',
              maxHeight: isResult ? 260 : 'none', overflowY: isResult ? 'auto' : 'visible' }}>
            <div style={{ fontFamily:MONO, fontSize:10, fontWeight:500, color:T.fg4,
                letterSpacing:'0.7px', textTransform:'uppercase', marginBottom:8,
                paddingLeft:2 }}>
              Activity log
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
              {logs.map((l, i) => (
                <LogLine key={i} phase={l.phase} text={l.text}
                  live={isRunning && i === logs.length - 1} />
              ))}
            </div>
          </div>
        )}

        {isResult && (
          <div style={{ padding:'18px 24px 24px' }}>
            {renderResult()}
          </div>
        )}
      </div>
    </section>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = window.useTweaks(/*EDITMODE-BEGIN*/{
    "darkMode": true,
    "demoState": "custom",
    "demoAction": "cfgshow"
  }/*EDITMODE-END*/);

  const dark = !!tweaks.darkMode;
  const T = React.useMemo(() => makeTheme(dark), [dark]);

  // form state — superset of all action forms
  const [actionId, setActionId] = React.useState('deep');
  const [state, setState] = React.useState({
    topic: 'storm surge inundation under climate change',
    backend: 'Anthropic',
    dest: 'Local',
    guides: [],
    artifact: '2401.12345',
    artifactA: '2401.12345',
    artifactB: '2310.06825',
    query: 'storm surge inundation',
    maxResults: 10,
    arxivId: '2401.12345',
    outPath: '',
    srcPath: '',
    maxSources: 20,
    nlm: true, gate: true, persp: true,
    cfgKey: 'anthropic_api_key',
    cfgVal: '',
  });
  const set = (k, v) => setState(s => ({ ...s, [k]: v }));

  const [status, setStatus] = React.useState('running'); // idle | running | success | failure
  const [logs, setLogs] = React.useState(() => scriptFor('deep').slice(0, 6));
  const [gating, setGating] = React.useState(false);
  const runRef = React.useRef({ timer: null, idx: 0 });

  const action = findAction(actionId);

  // Sync from tweaks for design exploration
  React.useEffect(() => {
    if (tweaks.demoAction && tweaks.demoAction !== actionId) {
      setActionId(tweaks.demoAction);
    }
  }, [tweaks.demoAction]);

  React.useEffect(() => {
    // when action changes via UI, also tell tweaks
    if (tweaks.demoAction !== actionId) setTweak('demoAction', actionId);
  }, [actionId]);

  React.useEffect(() => {
    const s = tweaks.demoState;
    if (!s) return;
    stopRun();
    if (s === 'empty') { setStatus('idle'); setLogs([]); }
    else if (s === 'running') { setStatus('running'); setLogs(scriptFor(actionId).slice(0, Math.max(1, scriptFor(actionId).length - 4))); }
    else if (s === 'success') { setStatus('success'); setLogs(scriptFor(actionId)); }
    else if (s === 'failure') {
      setStatus('failure');
      setLogs([
        ...scriptFor(actionId).slice(0, 3),
        { phase:'error', text:'Anthropic backend returned 401 unauthorized' },
      ]);
    }
  }, [tweaks.demoState, actionId]);

  function stopRun() {
    if (runRef.current.timer) { clearTimeout(runRef.current.timer); runRef.current.timer = null; }
  }

  function startRun() {
    stopRun();
    const script = scriptFor(actionId);
    setLogs([]);
    setStatus('running');
    runRef.current.idx = 0;
    const tick = () => {
      const i = runRef.current.idx;
      if (i >= script.length) {
        setStatus('success');
        runRef.current.timer = null;
        return;
      }
      setLogs(prev => [...prev, script[i]]);
      runRef.current.idx = i + 1;
      runRef.current.timer = setTimeout(tick, 650 + Math.random()*200);
    };
    tick();
  }

  function handleRun() { setTweak('demoState', 'custom'); startRun(); }
  function handleStop() {
    stopRun();
    setStatus('success');
  }
  function handleReset() {
    stopRun();
    setStatus('idle');
    setLogs([]);
    setTweak('demoState', 'empty');
  }

  return (
    <ThemeCtx.Provider value={T}>
      <div style={{ display:'flex', height:'100vh', width:'100vw', overflow:'hidden',
          background:T.bg, color:T.fg1, transition:'background 0.2s, color 0.2s' }}>
        <Sidebar active="studio" />
        <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0, overflow:'hidden' }}>
          <StatusBanner dark={dark} setDark={v=>setTweak('darkMode', v)} />
          <div style={{ flex:1, display:'flex', minHeight:0, overflow:'hidden' }}>
            <LeftColumn
              actionId={actionId} setActionId={setActionId}
              state={state} set={set}
              onRun={handleRun}
              gating={gating} setGating={setGating} />
            <OutputPanel
              action={action} state={state}
              status={status} logs={logs}
              onStop={handleStop} onReset={handleReset} />
          </div>
        </div>

        <window.TweaksPanel>
          <window.TweakToggle label="Dark Mode" value={tweaks.darkMode}
            onChange={v => setTweak('darkMode', v)} />
          <window.TweakSelect label="Demo State" value={tweaks.demoState}
            options={['empty','running','success','failure']}
            onChange={v => setTweak('demoState', v)} />
          <window.TweakSelect label="Demo Action" value={tweaks.demoAction}
            options={ALL_ACTIONS.map(a => a.id)}
            onChange={v => setTweak('demoAction', v)} />
        </window.TweaksPanel>
      </div>
    </ThemeCtx.Provider>
  );
}
